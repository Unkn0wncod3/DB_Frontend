<article class="schema-field-card">
  <button
    *ngIf="canEditSchema()"
    type="button"
    class="schema-field-card__edit"
    (click)="onEditRequest()"
    [attr.aria-label]="'schemaFields.actions.edit' | translate"
    [title]="'schemaFields.actions.edit' | translate"
  >
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path
        d="M12 20h9"
        fill="none"
        stroke="currentColor"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="1.8"
      />
      <path
        d="M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4 11.5-11.5Z"
        fill="none"
        stroke="currentColor"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="1.8"
      />
    </svg>
  </button>

  <ng-container *ngIf="field().data_type === 'boolean'; else defaultField">
    <div class="schema-field-card__boolean-header">
      <div class="schema-field-card__boolean-copy">
        <label class="schema-field-card__boolean-label" [attr.for]="fieldId()">
          {{ label() }}
          <span *ngIf="showRequiredMarker() && field().is_required" class="schema-field-card__required">*</span>
        </label>
        <span
          class="schema-field-card__boolean-state"
          [class.schema-field-card__boolean-state--active]="control().value"
        >
          {{ control().value ? ('schemaFields.boolean.enabled' | translate) : ('schemaFields.boolean.disabled' | translate) }}
        </span>
      </div>
      <label class="schema-field-card__switch" [attr.for]="fieldId()">
        <input type="checkbox" [id]="fieldId()" [formControl]="control()" />
        <span class="schema-field-card__switch-track" aria-hidden="true">
          <span class="schema-field-card__switch-thumb"></span>
        </span>
      </label>
    </div>
    <p class="schema-field-card__hint" *ngIf="hint() as helpText">{{ helpText }}</p>
  </ng-container>

  <ng-template #defaultField>
    <label [attr.for]="fieldId()">
      {{ label() }}
      <span *ngIf="showRequiredMarker() && field().is_required" class="schema-field-card__required">*</span>
    </label>
    <p class="schema-field-card__hint" *ngIf="hint() as helpText">{{ helpText }}</p>

    <ng-container [ngSwitch]="field().data_type">
      <textarea *ngSwitchCase="'long_text'" [id]="fieldId()" [formControl]="control()" rows="6"></textarea>
      <textarea *ngSwitchCase="'json'" [id]="fieldId()" [formControl]="control()" rows="8"></textarea>
      <input *ngSwitchCase="'integer'" type="number" [id]="fieldId()" [formControl]="control()" step="1" />
      <input *ngSwitchCase="'decimal'" type="number" [id]="fieldId()" [formControl]="control()" step="0.01" />
      <input *ngSwitchCase="'date'" type="date" [id]="fieldId()" [formControl]="control()" />
      <input *ngSwitchCase="'datetime'" type="datetime-local" [id]="fieldId()" [formControl]="control()" />
      <input *ngSwitchCase="'email'" type="email" [id]="fieldId()" [formControl]="control()" />
      <input *ngSwitchCase="'url'" type="url" [id]="fieldId()" [formControl]="control()" />

      <select *ngSwitchCase="'select'" [id]="fieldId()" [formControl]="control()">
        <option value="">{{ 'entryDetail.form.selectPlaceholder' | translate }}</option>
        <option *ngFor="let option of fieldOptions()" [value]="option.value">{{ option.label }}</option>
      </select>

      <select *ngSwitchCase="'multi_select'" [id]="fieldId()" [formControl]="control()" multiple size="5" class="schema-field-card__multi-select">
        <option *ngFor="let option of fieldOptions()" [value]="option.value">{{ option.label }}</option>
      </select>

      <div *ngSwitchCase="'reference'" class="schema-field-card__reference-field">
        <input type="text" [id]="fieldId()" [formControl]="control()" />
        <a
          *ngIf="referenceLink() as link"
          class="schema-field-card__reference-link"
          [routerLink]="link"
        >
          {{ referenceLabel() || control().value }}
        </a>
      </div>

      <input *ngSwitchCase="'file'" type="text" [id]="fieldId()" [formControl]="control()" />
      <input *ngSwitchDefault type="text" [id]="fieldId()" [formControl]="control()" />
    </ng-container>
  </ng-template>
</article>
